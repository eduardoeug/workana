<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumo — loja virtual (demo React)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FBF8F4;
    --surface:#FFFFFF;
    --ink:#2A2420;
    --muted:#8C8178;
    --line:#EDE6DC;
    --clay:#C0664E;
    --clay-d:#A4533D;
    --clay-soft:#F6E6DF;
    --sage:#6E8E76;
    --green:#4E9A6B;
    --mauve:#A877A0;
    --gold:#C79A52;
    --dark:#241E1A;
    --radius:16px;
    --shadow:0 1px 2px rgba(42,36,32,.04), 0 12px 30px rgba(42,36,32,.08);
    --display:'Fraunces', Georgia, serif;
    --body:'Inter', system-ui, sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:var(--body);background:var(--bg);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none;cursor:pointer}
  .wrap{max-width:1180px;margin:0 auto;padding:0 22px}
  .boot{min-height:60vh;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:14px}

  .announce{background:var(--dark);color:#F3E9DD;text-align:center;font-size:12.5px;letter-spacing:.02em;padding:9px 14px}
  .announce b{color:var(--gold)}

  .hdr{position:sticky;top:0;z-index:30;background:rgba(251,248,244,.86);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
  .hdr-in{display:flex;align-items:center;gap:20px;padding:15px 0}
  .logo{font-family:var(--display);font-weight:700;font-size:25px;letter-spacing:-.01em;display:flex;align-items:center;gap:8px}
  .logo .dot{width:9px;height:9px;border-radius:50%;background:var(--clay);margin-top:6px}
  .nav{display:flex;gap:6px;margin-left:8px}
  .nav button{border:none;background:none;font:inherit;font-size:14px;font-weight:500;color:var(--muted);padding:7px 12px;border-radius:9px;cursor:pointer;transition:.15s}
  .nav button:hover{color:var(--ink);background:var(--clay-soft)}
  .nav button.on{color:var(--clay-d);font-weight:600}
  .hdr-act{margin-left:auto;display:flex;align-items:center;gap:8px}
  .icobtn{border:1px solid var(--line);background:var(--surface);width:42px;height:42px;border-radius:12px;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;position:relative;transition:.15s}
  .icobtn:hover{border-color:var(--clay);color:var(--clay-d)}
  .badge{position:absolute;top:-6px;right:-6px;background:var(--clay);color:#fff;font-size:11px;font-weight:700;min-width:20px;height:20px;border-radius:20px;display:flex;align-items:center;justify-content:center;padding:0 5px}

  .hero{display:grid;grid-template-columns:1.05fr .95fr;gap:30px;align-items:center;padding:46px 0 30px}
  .hero .eye{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--clay-d);font-weight:700}
  .hero h1{font-family:var(--display);font-weight:600;font-size:clamp(34px,5vw,54px);line-height:1.04;letter-spacing:-.01em;margin:14px 0 16px}
  .hero p{color:var(--muted);font-size:16px;max-width:440px;margin-bottom:24px}
  .cta{display:inline-flex;align-items:center;gap:9px;background:var(--clay);color:#fff;border:none;font:inherit;font-weight:600;font-size:15px;padding:14px 26px;border-radius:13px;cursor:pointer;transition:.15s;box-shadow:0 10px 24px rgba(192,102,78,.28)}
  .cta:hover{background:var(--clay-d)}
  .hero-art{height:330px;border-radius:26px;background:linear-gradient(150deg,#F6E6DF 0%,#EDE7DF 50%,#E4ECE5 100%);position:relative;overflow:hidden;box-shadow:var(--shadow)}
  .float{position:absolute;border-radius:22px;background:#fff;box-shadow:0 10px 26px rgba(42,36,32,.12);display:flex;align-items:center;justify-content:center;font-size:46px}
  .float.f1{width:130px;height:130px;left:8%;top:14%;transform:rotate(-6deg)}
  .float.f2{width:120px;height:120px;right:10%;top:20%;transform:rotate(7deg);font-size:42px}
  .float.f3{width:140px;height:140px;left:30%;bottom:8%;transform:rotate(3deg);font-size:50px}
  .float .pricetag{position:absolute;bottom:-12px;background:var(--ink);color:#fff;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px}

  .catbar{display:flex;gap:9px;flex-wrap:wrap;padding:18px 0 6px}
  .pill{border:1.5px solid var(--line);background:var(--surface);font:inherit;font-size:13.5px;font-weight:600;color:var(--muted);padding:9px 17px;border-radius:30px;cursor:pointer;transition:.15s}
  .pill:hover{border-color:var(--clay)}
  .pill.on{background:var(--ink);border-color:var(--ink);color:#fff}

  .shead{display:flex;align-items:baseline;justify-content:space-between;margin:24px 0 16px}
  .shead h2{font-family:var(--display);font-weight:600;font-size:24px}
  .shead span{font-size:13px;color:var(--muted)}

  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;padding-bottom:30px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;transition:transform .18s ease,box-shadow .18s ease;display:flex;flex-direction:column}
  .card:hover{transform:translateY(-4px);box-shadow:var(--shadow)}
  .ph{height:170px;display:flex;align-items:center;justify-content:center;font-size:62px;position:relative}
  .tag{position:absolute;top:11px;left:11px;background:#fff;color:var(--clay-d);font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;box-shadow:0 2px 8px rgba(42,36,32,.10)}
  .tag.best{background:var(--ink);color:#fff}
  .cbody{padding:14px 15px 16px;display:flex;flex-direction:column;flex:1}
  .ccat{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:600}
  .cname{font-size:15px;font-weight:600;margin:3px 0 10px;flex:1}
  .crow{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .price{font-family:var(--display);font-weight:600;font-size:19px}
  .addbtn{border:1.5px solid var(--ink);background:var(--surface);color:var(--ink);width:40px;height:40px;border-radius:11px;font-size:20px;cursor:pointer;flex:none;transition:.15s;display:flex;align-items:center;justify-content:center}
  .addbtn:hover{background:var(--ink);color:#fff}

  .backdrop{position:fixed;inset:0;background:rgba(36,30,26,.42);opacity:0;pointer-events:none;transition:opacity .25s;z-index:50}
  .backdrop.show{opacity:1;pointer-events:auto}
  .drawer{position:fixed;top:0;right:0;height:100%;width:390px;max-width:92vw;background:var(--bg);z-index:51;transform:translateX(105%);transition:transform .3s cubic-bezier(.3,0,.2,1);display:flex;flex-direction:column;box-shadow:-20px 0 50px rgba(42,36,32,.18)}
  .drawer.show{transform:translateX(0)}
  .dhead{display:flex;align-items:center;justify-content:space-between;padding:20px 22px;border-bottom:1px solid var(--line)}
  .dhead h3{font-family:var(--display);font-weight:600;font-size:20px}
  .dclose{border:none;background:none;font-size:24px;cursor:pointer;color:var(--muted);line-height:1}
  .ditems{flex:1;overflow-y:auto;padding:8px 18px}
  .citem{display:flex;gap:13px;padding:14px 4px;border-bottom:1px solid var(--line)}
  .citem .ci-ph{width:60px;height:60px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:28px;flex:none}
  .citem .ci-b{flex:1;min-width:0}
  .citem .ci-b b{font-size:14px;font-weight:600;display:block}
  .citem .ci-b .p{font-size:13px;color:var(--muted);margin-top:2px}
  .qty{display:flex;align-items:center;gap:10px;margin-top:9px}
  .qty button{width:26px;height:26px;border-radius:8px;border:1.5px solid var(--line);background:#fff;cursor:pointer;font-size:15px;line-height:1;color:var(--ink)}
  .qty span{font-weight:700;font-size:14px;min-width:18px;text-align:center}
  .qty .rm{margin-left:auto;border:none;background:none;color:var(--muted);font-size:12px;cursor:pointer;text-decoration:underline;width:auto}
  .empty{text-align:center;color:var(--muted);padding:50px 20px;font-size:14px}
  .empty .e{font-size:42px;display:block;margin-bottom:10px;opacity:.5}
  .dfoot{border-top:1px solid var(--line);padding:18px 22px 22px;background:var(--surface)}
  .frete{font-size:12.5px;text-align:center;padding:8px;border-radius:10px;background:var(--clay-soft);color:var(--clay-d);font-weight:600;margin-bottom:14px}
  .frete.ok{background:#E6F1E9;color:#3C7A52}
  .subt{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px}
  .subt .l{font-size:13px;color:var(--muted)}
  .subt .v{font-family:var(--display);font-weight:700;font-size:24px}
  .checkout{width:100%;border:none;background:var(--clay);color:#fff;font:inherit;font-weight:700;font-size:15px;padding:15px;border-radius:13px;cursor:pointer;transition:.15s}
  .checkout:hover{background:var(--clay-d)}
  .checkout:disabled{background:var(--line);color:var(--muted);cursor:not-allowed}

  .toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);background:var(--ink);color:#fff;font-size:13.5px;font-weight:600;padding:12px 20px;border-radius:30px;z-index:60;box-shadow:0 12px 30px rgba(42,36,32,.25);animation:up .25s ease}
  @keyframes up{from{opacity:0;transform:translate(-50%,12px)}to{opacity:1;transform:translate(-50%,0)}}

  footer{border-top:1px solid var(--line);margin-top:24px;background:var(--surface)}
  .foot-in{display:flex;justify-content:space-between;gap:20px;flex-wrap:wrap;padding:30px 0}
  .foot-in .logo{font-size:21px}
  .foot-col h4{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
  .foot-col a{display:block;font-size:13.5px;color:var(--ink);opacity:.8;padding:3px 0}
  .foot-note{text-align:center;font-size:12px;color:var(--muted);padding:16px;border-top:1px solid var(--line)}

  @media (max-width:920px){
    .grid{grid-template-columns:repeat(3,1fr)}
    .nav{display:none}
    .hero{grid-template-columns:1fr;gap:18px}
    .hero-art{height:260px;order:-1}
  }
  @media (max-width:600px){
    .grid{grid-template-columns:repeat(2,1fr);gap:13px}
    .ph{height:140px;font-size:50px}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>
  <div id="root"><div class="boot">Carregando a loja…</div></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/htm@3/dist/htm.umd.js"></script>
  <script>
const {useState, useEffect} = React;
const html = htm.bind(React.createElement);

// ---------- Dados ----------
const CAT_COLOR = {
  'Decoração':'#C0664E', 'Cozinha':'#6E8E76', 'Plantas':'#4E9A6B', 'Bem-estar':'#A877A0'
};
const PRODUCTS = [
  {id:1,  nome:'Vaso de Cerâmica',     cat:'Decoração', preco:89,  emoji:'🏺', tag:'Novo'},
  {id:2,  nome:'Quadro Abstrato',      cat:'Decoração', preco:149, emoji:'🖼️'},
  {id:3,  nome:'Luminária de Mesa',     cat:'Decoração', preco:259, emoji:'💡', tag:'Mais vendido'},
  {id:4,  nome:'Relógio de Parede',     cat:'Decoração', preco:59,  emoji:'🕰️'},
  {id:5,  nome:'Caneca Artesanal',     cat:'Cozinha',   preco:39,  emoji:'☕', tag:'Novo'},
  {id:6,  nome:'Jogo de Pratos (4pç)', cat:'Cozinha',   preco:199, emoji:'🍽️'},
  {id:7,  nome:'Jogo de Talheres',     cat:'Cozinha',   preco:79,  emoji:'🍴'},
  {id:8,  nome:'Girassol Decorativo',    cat:'Plantas',   preco:45,  emoji:'🌻', tag:'Mais vendido'},
  {id:9,  nome:'Cacto Decorativo',     cat:'Plantas',   preco:35,  emoji:'🌵'},
  {id:10, nome:'Folhagem Tropical',    cat:'Plantas',   preco:129, emoji:'🌿'},
  {id:11, nome:'Vela Aromática',       cat:'Bem-estar', preco:69,  emoji:'🕯️'},
  {id:12, nome:'Difusor de Aromas',    cat:'Bem-estar', preco:99,  emoji:'💨', tag:'Novo'},
  {id:13, nome:'Manta de Tricô',       cat:'Bem-estar', preco:179, emoji:'🧶'}
];
const CATS = ['Todos','Decoração','Cozinha','Plantas','Bem-estar'];
const FRETE_GRATIS = 199;

const BRL = new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'});
const money = v => BRL.format(v);
const tint = c => ({background:'linear-gradient(150deg, '+c+'22, '+c+'3a)'});

function App(){
  const [cat, setCat] = useState('Todos');
  const [cart, setCart] = useState(()=>{ try{ return JSON.parse(localStorage.getItem('lumo-cart'))||[]; }catch(e){ return []; } });
  const [open, setOpen] = useState(false);
  const [toast, setToast] = useState(null);

  useEffect(()=>{ try{ localStorage.setItem('lumo-cart', JSON.stringify(cart)); }catch(e){} }, [cart]);

  const shown = cat==='Todos' ? PRODUCTS : PRODUCTS.filter(p=>p.cat===cat);
  const count = cart.reduce((s,i)=>s+i.qty,0);
  const subtotal = cart.reduce((s,i)=>s+i.preco*i.qty,0);

  const showToast = t => { setToast(t); clearTimeout(window.__tt); window.__tt=setTimeout(()=>setToast(null),1700); };
  const add = p => { setCart(c=>{ const f=c.find(i=>i.id===p.id); return f ? c.map(i=>i.id===p.id?{...i,qty:i.qty+1}:i) : [...c,{...p,qty:1}]; }); showToast(p.nome+' adicionado ✓'); };
  const setQty = (id,d) => setCart(c=>c.map(i=>i.id===id?{...i,qty:Math.max(1,i.qty+d)}:i));
  const remove = id => setCart(c=>c.filter(i=>i.id!==id));
  const checkout = () => { if(!cart.length) return; setCart([]); setOpen(false); showToast('Compra simulada — é só um protótipo 😉'); };

  const navBtns = CATS.map(c => html`<button key=${c} className=${cat===c?'on':''} onClick=${()=>setCat(c)}>${c}</button>`);
  const pills = CATS.map(c => html`<button key=${c} className=${'pill'+(cat===c?' on':'')} onClick=${()=>setCat(c)}>${c}</button>`);

  const cards = shown.map(p => html`
    <div className="card" key=${p.id}>
      <div className="ph" style=${tint(CAT_COLOR[p.cat])}>
        ${p.tag ? html`<span className=${'tag'+(p.tag==='Mais vendido'?' best':'')}>${p.tag}</span>` : null}
        ${p.emoji}
      </div>
      <div className="cbody">
        <div className="ccat">${p.cat}</div>
        <div className="cname">${p.nome}</div>
        <div className="crow">
          <span className="price">${money(p.preco)}</span>
          <button className="addbtn" title="Adicionar" onClick=${()=>add(p)}>+</button>
        </div>
      </div>
    </div>`);

  const items = cart.length===0
    ? html`<div className="empty"><span className="e">🛍️</span>Sua sacola está vazia.<br/>Que tal escolher algo bonito?</div>`
    : cart.map(i => html`
      <div className="citem" key=${i.id}>
        <div className="ci-ph" style=${tint(CAT_COLOR[i.cat])}>${i.emoji}</div>
        <div className="ci-b">
          <b>${i.nome}</b>
          <div className="p">${money(i.preco)}</div>
          <div className="qty">
            <button onClick=${()=>setQty(i.id,-1)}>−</button>
            <span>${i.qty}</span>
            <button onClick=${()=>setQty(i.id,1)}>+</button>
            <button className="rm" onClick=${()=>remove(i.id)}>remover</button>
          </div>
        </div>
      </div>`);

  const frete = subtotal>0
    ? (subtotal>=FRETE_GRATIS
        ? html`<div className="frete ok">🎉 Você ganhou frete grátis!</div>`
        : html`<div className="frete">Faltam ${money(FRETE_GRATIS-subtotal)} para o frete grátis</div>`)
    : null;

  return html`
    <${React.Fragment}>
      <div className="announce">Frete grátis acima de <b>${money(FRETE_GRATIS)}</b> ✦ Parcele em até <b>6x sem juros</b></div>

      <header className="hdr">
        <div className="wrap hdr-in">
          <div className="logo">Lumo<span className="dot"></span></div>
          <nav className="nav">${navBtns}</nav>
          <div className="hdr-act">
            <button className="icobtn" title="Buscar">🔍</button>
            <button className="icobtn" title="Carrinho" onClick=${()=>setOpen(true)}>🛍️${count>0 ? html`<span className="badge">${count}</span>` : null}</button>
          </div>
        </div>
      </header>

      <div className="wrap">
        <section className="hero">
          <div>
            <div className="eye">Casa & Estilo</div>
            <h1>Sua casa com a sua cara.</h1>
            <p>Curadoria de peças que transformam qualquer cantinho. Design autoral, entrega rápida e aquele toque que faz a diferença.</p>
            <button className="cta" onClick=${()=>{ setCat('Todos'); document.getElementById('vitrine').scrollIntoView({behavior:'smooth'}); }}>Ver coleção →</button>
          </div>
          <div className="hero-art">
            <div className="float f1" style=${tint('#C0664E')}>🏺<span className="pricetag">R$ 89</span></div>
            <div className="float f2" style=${tint('#A877A0')}>🕯️<span className="pricetag">R$ 69</span></div>
            <div className="float f3" style=${tint('#4E9A6B')}>🌻<span className="pricetag">R$ 45</span></div>
          </div>
        </section>

        <div id="vitrine"></div>
        <div className="catbar">${pills}</div>

        <div className="shead">
          <h2>${cat==='Todos'?'Nossa vitrine':cat}</h2>
          <span>${shown.length} produto(s)</span>
        </div>

        <div className="grid">${cards}</div>
      </div>

      <footer>
        <div className="wrap foot-in">
          <div>
            <div className="logo">Lumo<span className="dot"></span></div>
            <p style=${{color:'var(--muted)',fontSize:'13px',marginTop:'8px',maxWidth:'240px'}}>Peças com curadoria pra deixar sua casa do seu jeito.</p>
          </div>
          <div className="foot-col"><h4>Loja</h4><a>Novidades</a><a>Mais vendidos</a><a>Promoções</a></div>
          <div className="foot-col"><h4>Ajuda</h4><a>Entrega</a><a>Trocas</a><a>Contato</a></div>
          <div className="foot-col"><h4>Pagamento</h4><a>Pix</a><a>Cartão em 6x</a><a>Boleto</a></div>
        </div>
        <div className="foot-note">Protótipo demonstrativo · loja fictícia construída em React · carrinho salvo neste navegador</div>
      </footer>

      <div className=${'backdrop'+(open?' show':'')} onClick=${()=>setOpen(false)}></div>
      <aside className=${'drawer'+(open?' show':'')}>
        <div className="dhead">
          <h3>Sua sacola${count>0?' ('+count+')':''}</h3>
          <button className="dclose" onClick=${()=>setOpen(false)}>×</button>
        </div>
        <div className="ditems">${items}</div>
        <div className="dfoot">
          ${frete}
          <div className="subt"><span className="l">Subtotal</span><span className="v">${money(subtotal)}</span></div>
          <button className="checkout" disabled=${!cart.length} onClick=${checkout}>Finalizar compra</button>
        </div>
      </aside>

      ${toast ? html`<div className="toast">${toast}</div>` : null}
    <//>`;
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
