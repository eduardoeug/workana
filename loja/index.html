<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumo — loja virtual (demo React)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FFFFFF;
    --bg2:#FAF9F6;
    --ink:#171513;
    --muted:#908B84;
    --line:#ECEAE4;
    --line2:#DDD9D1;
    --sans:'Inter', system-ui, sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:var(--sans);background:var(--bg);color:var(--ink);line-height:1.55;-webkit-font-smoothing:antialiased}
  img{display:block;max-width:100%}
  button{font-family:inherit}
  .wrap{max-width:1200px;margin:0 auto;padding:0 28px}
  .boot{min-height:60vh;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:14px}

  .hdr{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.88);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
  .hdr-in{display:flex;align-items:center;gap:30px;height:70px}
  .logo{font-size:21px;font-weight:500;letter-spacing:.26em;cursor:pointer}
  .nav{display:flex;gap:26px}
  .nav button{border:none;background:none;font-size:13px;color:var(--muted);cursor:pointer;letter-spacing:.02em;transition:color .15s}
  .nav button:hover,.nav button.on{color:var(--ink)}
  .acts{margin-left:auto;display:flex;align-items:center;gap:22px}
  .bag{border:none;background:none;cursor:pointer;font-size:13px;letter-spacing:.04em;color:var(--ink);display:flex;align-items:center;gap:7px}
  .bag .dot{min-width:18px;height:18px;border-radius:50%;background:var(--ink);color:#fff;font-size:11px;display:inline-flex;align-items:center;justify-content:center;padding:0 5px}

  .hero{display:grid;grid-template-columns:1fr 1fr;gap:56px;align-items:center;padding:76px 0 64px}
  .hero .eyebrow{font-size:12px;letter-spacing:.24em;text-transform:uppercase;color:var(--muted)}
  .hero h1{font-size:clamp(38px,5.2vw,62px);font-weight:300;line-height:1.04;letter-spacing:-.025em;margin:20px 0 22px}
  .hero p{color:var(--muted);font-size:16px;max-width:390px;margin-bottom:30px;line-height:1.7}
  .cta{display:inline-block;background:var(--ink);color:#fff;border:none;font-size:12.5px;letter-spacing:.14em;text-transform:uppercase;padding:15px 32px;cursor:pointer;transition:opacity .15s}
  .cta:hover{opacity:.82}
  .hero-img{aspect-ratio:4/5;background:var(--bg2);overflow:hidden}
  .hero-img img{width:100%;height:100%;object-fit:cover}

  .filters{display:flex;gap:28px;border-bottom:1px solid var(--line);margin:8px 0 40px;overflow-x:auto;scrollbar-width:none}
  .filters::-webkit-scrollbar{display:none}
  .filters button{background:none;border:none;font-size:14px;color:var(--muted);padding:0 0 16px;border-bottom:1.5px solid transparent;margin-bottom:-1px;cursor:pointer;white-space:nowrap;transition:.15s}
  .filters button:hover{color:var(--ink)}
  .filters button.on{color:var(--ink);border-bottom-color:var(--ink)}

  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:36px 20px;padding-bottom:70px}
  .card{display:flex;flex-direction:column}
  .pimg{position:relative;aspect-ratio:1/1;background:var(--bg2);overflow:hidden;margin-bottom:14px}
  .pimg img{width:100%;height:100%;object-fit:cover;transition:transform .6s cubic-bezier(.2,0,.2,1)}
  .card:hover .pimg img{transform:scale(1.05)}
  .tag{position:absolute;top:12px;left:12px;background:#fff;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;padding:6px 11px;color:var(--ink)}
  .add{position:absolute;left:12px;right:12px;bottom:12px;background:var(--ink);color:#fff;border:none;font-size:11.5px;letter-spacing:.12em;text-transform:uppercase;padding:13px;cursor:pointer;opacity:0;transform:translateY(8px);transition:opacity .22s,transform .22s}
  .card:hover .add{opacity:1;transform:none}
  .pcat{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
  .pname{font-size:14.5px;font-weight:400;line-height:1.3}
  .pprice{font-size:14px;color:var(--ink);margin-top:6px;letter-spacing:.01em}

  .backdrop{position:fixed;inset:0;background:rgba(23,21,19,.34);opacity:0;pointer-events:none;transition:opacity .25s;z-index:50}
  .backdrop.show{opacity:1;pointer-events:auto}
  .drawer{position:fixed;top:0;right:0;height:100%;width:400px;max-width:92vw;background:var(--bg);z-index:51;transform:translateX(105%);transition:transform .32s cubic-bezier(.3,0,.2,1);display:flex;flex-direction:column}
  .drawer.show{transform:translateX(0)}
  .dhead{display:flex;align-items:center;justify-content:space-between;padding:24px 26px 18px;border-bottom:1px solid var(--line)}
  .dhead h3{font-size:13px;font-weight:500;letter-spacing:.16em;text-transform:uppercase}
  .dclose{border:none;background:none;font-size:22px;cursor:pointer;color:var(--muted);line-height:1}
  .ditems{flex:1;overflow-y:auto;padding:6px 26px}
  .citem{display:flex;gap:16px;padding:20px 0;border-bottom:1px solid var(--line)}
  .citem .ci-img{width:64px;height:80px;background:var(--bg2);overflow:hidden;flex:none}
  .citem .ci-img img{width:100%;height:100%;object-fit:cover}
  .citem .ci-b{flex:1;min-width:0}
  .citem .ci-b .n{font-size:14px;font-weight:400}
  .citem .ci-b .pr{font-size:13px;color:var(--muted);margin-top:3px}
  .qty{display:flex;align-items:center;gap:0;margin-top:12px;border:1px solid var(--line2);width:fit-content}
  .qty button{width:30px;height:30px;border:none;background:none;cursor:pointer;font-size:15px;color:var(--ink)}
  .qty span{font-size:13px;min-width:30px;text-align:center}
  .rm{margin-left:auto;align-self:flex-start;border:none;background:none;color:var(--muted);font-size:12px;cursor:pointer;text-decoration:underline}
  .empty{text-align:center;color:var(--muted);padding:70px 20px;font-size:14px}
  .dfoot{border-top:1px solid var(--line);padding:22px 26px 26px}
  .frete{font-size:12px;text-align:center;padding:10px;background:var(--bg2);color:var(--muted);margin-bottom:16px;letter-spacing:.02em}
  .frete.ok{color:var(--ink)}
  .subt{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:18px}
  .subt .l{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
  .subt .v{font-size:22px;font-weight:400}
  .checkout{width:100%;border:none;background:var(--ink);color:#fff;font-size:12.5px;letter-spacing:.14em;text-transform:uppercase;padding:17px;cursor:pointer;transition:opacity .15s}
  .checkout:hover{opacity:.82}
  .checkout:disabled{background:var(--line2);cursor:not-allowed}

  .toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%);background:var(--ink);color:#fff;font-size:13px;letter-spacing:.03em;padding:13px 22px;z-index:60;animation:up .25s ease}
  @keyframes up{from{opacity:0;transform:translate(-50%,10px)}to{opacity:1;transform:translate(-50%,0)}}

  footer{border-top:1px solid var(--line);margin-top:30px}
  .foot-in{display:flex;justify-content:space-between;gap:30px;flex-wrap:wrap;padding:54px 0 40px}
  .foot-col h4{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:16px;font-weight:500}
  .foot-col a{display:block;font-size:13.5px;color:var(--ink);opacity:.75;padding:5px 0;cursor:pointer}
  .foot-brand .logo{margin-bottom:12px}
  .foot-brand p{font-size:13px;color:var(--muted);max-width:230px;line-height:1.7}
  .foot-note{text-align:center;font-size:11.5px;color:var(--muted);padding:18px;border-top:1px solid var(--line);letter-spacing:.02em}

  @media (max-width:980px){
    .grid{grid-template-columns:repeat(3,1fr);gap:30px 18px}
    .nav{display:none}
    .hero{grid-template-columns:1fr;gap:30px;padding:48px 0 44px}
    .hero-img{order:-1;aspect-ratio:16/10}
  }
  @media (max-width:620px){
    .wrap{padding:0 18px}
    .grid{grid-template-columns:repeat(2,1fr);gap:26px 14px}
    .add{opacity:1;transform:none}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>
  <div id="root"><div class="boot">Carregando a loja…</div></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/htm@3/dist/htm.umd.js"></script>
  <script>
const {useState, useEffect} = React;
const html = htm.bind(React.createElement);

const ph = (id,w,h) => 'https://images.unsplash.com/photo-'+id+'?auto=format&fit=crop&w='+w+'&h='+h+'&q=80';
const sq = id => ph(id,700,700);
const PRODUCTS = [
  {id:1, nome:'Vaso de Cerâmica',   cat:'Decoração', preco:119, img:sq('1631125915902-d8abe9225ff2'), tag:'Novo'},
  {id:2, nome:'Luminária de Mesa',  cat:'Decoração', preco:189, img:sq('1517991104123-1d56a6e81ed9')},
  {id:3, nome:'Relógio de Parede',  cat:'Decoração', preco:99,  img:sq('1563861826100-9cb868fdbe1c')},
  {id:4, nome:'Caneca de Cerâmica', cat:'Mesa',      preco:49,  img:sq('1610632380989-680fe40816c6'), tag:'Novo'},
  {id:5, nome:'Bowl de Cerâmica',   cat:'Mesa',      preco:59,  img:sq('1510035618584-c442b241abe7')},
  {id:6, nome:'Suculenta no Vaso',  cat:'Plantas',   preco:45,  img:sq('1520302630591-fd1c66edc19d'), tag:'Mais vendido'},
  {id:7, nome:'Costela-de-adão',    cat:'Plantas',   preco:139, img:sq('1525498128493-380d1990a112')},
  {id:8, nome:'Vela Aromática',     cat:'Conforto',  preco:69,  img:sq('1561212856-44e9bae482aa')},
  {id:9, nome:'Manta de Tricô',     cat:'Conforto',  preco:179, img:sq('1600369672770-985fd30004eb'), tag:'Mais vendido'}
];
const HERO_IMG = ph('1583847268964-b28dc8f51f92', 900, 1120);
const CATS = ['Todos','Decoração','Mesa','Plantas','Conforto'];
const FRETE_GRATIS = 199;

const BRL = new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'});
const money = v => BRL.format(v);

function App(){
  const [cat, setCat] = useState('Todos');
  const [cart, setCart] = useState(()=>{ try{ return JSON.parse(localStorage.getItem('lumo-cart'))||[]; }catch(e){ return []; } });
  const [open, setOpen] = useState(false);
  const [toast, setToast] = useState(null);

  useEffect(()=>{ try{ localStorage.setItem('lumo-cart', JSON.stringify(cart)); }catch(e){} }, [cart]);

  const shown = cat==='Todos' ? PRODUCTS : PRODUCTS.filter(p=>p.cat===cat);
  const count = cart.reduce((s,i)=>s+i.qty,0);
  const subtotal = cart.reduce((s,i)=>s+i.preco*i.qty,0);

  const showToast = t => { setToast(t); clearTimeout(window.__tt); window.__tt=setTimeout(()=>setToast(null),1700); };
  const add = p => { setCart(c=>{ const f=c.find(i=>i.id===p.id); return f ? c.map(i=>i.id===p.id?{...i,qty:i.qty+1}:i) : [...c,{...p,qty:1}]; }); showToast(p.nome+' adicionado à sacola'); };
  const setQty = (id,d) => setCart(c=>c.map(i=>i.id===id?{...i,qty:Math.max(1,i.qty+d)}:i));
  const remove = id => setCart(c=>c.filter(i=>i.id!==id));
  const checkout = () => { if(!cart.length) return; setCart([]); setOpen(false); showToast('Compra simulada — é só um protótipo'); };
  const goGrid = () => document.getElementById('vitrine').scrollIntoView({behavior:'smooth'});

  const pills = CATS.map(c => html`<button key=${c} className=${cat===c?'on':''} onClick=${()=>setCat(c)}>${c}</button>`);

  const cards = shown.map(p => html`
    <div className="card" key=${p.id}>
      <div className="pimg">
        ${p.tag ? html`<span className="tag">${p.tag}</span>` : null}
        <img src=${p.img} alt=${p.nome} loading="lazy"/>
        <button className="add" onClick=${()=>add(p)}>Adicionar</button>
      </div>
      <div className="pcat">${p.cat}</div>
      <div className="pname">${p.nome}</div>
      <div className="pprice">${money(p.preco)}</div>
    </div>`);

  const items = cart.length===0
    ? html`<div className="empty">Sua sacola está vazia.</div>`
    : cart.map(i => html`
      <div className="citem" key=${i.id}>
        <div className="ci-img"><img src=${i.img} alt=${i.nome} loading="lazy"/></div>
        <div className="ci-b">
          <div className="n">${i.nome}</div>
          <div className="pr">${money(i.preco)}</div>
          <div className="qty">
            <button onClick=${()=>setQty(i.id,-1)}>−</button>
            <span>${i.qty}</span>
            <button onClick=${()=>setQty(i.id,1)}>+</button>
          </div>
        </div>
        <button className="rm" onClick=${()=>remove(i.id)}>remover</button>
      </div>`);

  const frete = subtotal>0
    ? (subtotal>=FRETE_GRATIS
        ? html`<div className="frete ok">Você ganhou frete grátis</div>`
        : html`<div className="frete">Faltam ${money(FRETE_GRATIS-subtotal)} para o frete grátis</div>`)
    : null;

  return html`
    <${React.Fragment}>
      <header className="hdr">
        <div className="wrap hdr-in">
          <div className="logo" onClick=${()=>setCat('Todos')}>LUMO</div>
          <nav className="nav">
            <button className=${cat==='Todos'?'on':''} onClick=${()=>setCat('Todos')}>Novidades</button>
            <button onClick=${()=>setCat('Decoração')}>Decoração</button>
            <button onClick=${()=>setCat('Mesa')}>Mesa</button>
            <button onClick=${()=>setCat('Conforto')}>Conforto</button>
          </nav>
          <div className="acts">
            <button className="bag" onClick=${()=>setOpen(true)}>Sacola${count>0 ? html` <span className="dot">${count}</span>` : ''}</button>
          </div>
        </div>
      </header>

      <div className="wrap">
        <section className="hero">
          <div>
            <div className="eyebrow">Casa & estilo</div>
            <h1>Menos,<br/>porém melhor.</h1>
            <p>Peças escolhidas a dedo para deixar sua casa com a sua cara — design atemporal e materiais que duram.</p>
            <button className="cta" onClick=${goGrid}>Ver coleção</button>
          </div>
          <div className="hero-img"><img src=${HERO_IMG} alt="Ambiente decorado"/></div>
        </section>

        <div id="vitrine"></div>
        <div className="filters">${pills}</div>
        <div className="grid">${cards}</div>
      </div>

      <footer>
        <div className="wrap foot-in">
          <div className="foot-brand">
            <div className="logo">LUMO</div>
            <p>Curadoria de objetos para uma casa que respira calma.</p>
          </div>
          <div className="foot-col"><h4>Loja</h4><a>Novidades</a><a>Mais vendidos</a><a>Coleções</a></div>
          <div className="foot-col"><h4>Ajuda</h4><a>Entrega</a><a>Trocas</a><a>Contato</a></div>
          <div className="foot-col"><h4>Pagamento</h4><a>Pix</a><a>Cartão em 6x</a><a>Boleto</a></div>
        </div>
        <div className="foot-note">Protótipo demonstrativo · loja fictícia em React · imagens ilustrativas (Unsplash) · carrinho salvo neste navegador</div>
      </footer>

      <div className=${'backdrop'+(open?' show':'')} onClick=${()=>setOpen(false)}></div>
      <aside className=${'drawer'+(open?' show':'')}>
        <div className="dhead">
          <h3>Sacola${count>0?' · '+count:''}</h3>
          <button className="dclose" onClick=${()=>setOpen(false)}>×</button>
        </div>
        <div className="ditems">${items}</div>
        <div className="dfoot">
          ${frete}
          <div className="subt"><span className="l">Subtotal</span><span className="v">${money(subtotal)}</span></div>
          <button className="checkout" disabled=${!cart.length} onClick=${checkout}>Finalizar compra</button>
        </div>
      </aside>

      ${toast ? html`<div className="toast">${toast}</div>` : null}
    <//>`;
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
