<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bolso — controle financeiro pessoal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --screen:#F5F6FB;
    --card:#FFFFFF;
    --ink:#171B2C;
    --muted:#7C8398;
    --line:#ECEEF4;
    --line-2:#E2E5EF;
    --green:#13a06f;
    --green-d:#0c7d56;
    --in:#16A36B;
    --in-soft:#E4F6EE;
    --out:#E5573D;
    --out-soft:#FCE9E5;
    --display:'Sora', system-ui, sans-serif;
    --body:'Inter', system-ui, sans-serif;
    --shadow:0 1px 2px rgba(23,27,44,.05), 0 8px 22px rgba(23,27,44,.06);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:var(--body);background:radial-gradient(1200px 600px at 50% -10%, #EAECF6 0%, #DFE2EE 60%, #D6DAE8 100%);color:var(--ink);min-height:100vh;line-height:1.45;-webkit-font-smoothing:antialiased}

  .stage{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:26px 14px}

  /* ---------- Phone ---------- */
  .device{width:100%;max-width:392px;height:min(844px,94vh);background:var(--screen);border-radius:46px;position:relative;overflow:hidden;
    box-shadow:0 36px 80px rgba(20,25,45,.30), 0 0 0 11px #0f1320, 0 0 0 13px #2b3146}
  .notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:148px;height:27px;background:#0f1320;border-radius:0 0 18px 18px;z-index:40}
  .screen{height:100%;overflow-y:auto;overflow-x:hidden;scrollbar-width:none}
  .screen::-webkit-scrollbar{display:none}

  .statusbar{display:flex;justify-content:space-between;align-items:center;padding:12px 26px 2px;font-size:12.5px;font-weight:700;color:var(--ink)}
  .statusbar .ic{display:flex;gap:5px;align-items:center;font-size:11px}

  .app{padding:8px 18px 120px}

  /* ---------- Header ---------- */
  .head{display:flex;align-items:center;justify-content:space-between;padding:10px 2px 16px}
  .head .hi{font-size:13px;color:var(--muted)}
  .head .nm{font-family:var(--display);font-weight:800;font-size:20px;letter-spacing:-.01em;display:flex;align-items:center;gap:7px}
  .head .nm .d{width:9px;height:9px;border-radius:50%;background:var(--green)}
  .head .av{width:40px;height:40px;border-radius:50%;background:linear-gradient(150deg,#2b3146,#171B2C);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-family:var(--display);font-size:15px}

  /* ---------- Saldo ---------- */
  .balance{background:linear-gradient(150deg,#13a06f 0%,#0c7d56 55%,#0a6f4d 100%);color:#fff;border-radius:24px;padding:22px 22px 18px;box-shadow:0 16px 30px rgba(12,125,86,.30);position:relative;overflow:hidden}
  .balance::after{content:"";position:absolute;right:-40px;top:-40px;width:150px;height:150px;border-radius:50%;background:rgba(255,255,255,.08)}
  .balance .lab{font-size:12.5px;color:rgba(255,255,255,.85);font-weight:500;letter-spacing:.02em}
  .balance .amt{font-family:var(--display);font-weight:800;font-size:36px;letter-spacing:-.02em;margin:3px 0 16px;line-height:1}
  .balance .io{display:flex;gap:10px}
  .pillio{flex:1;background:rgba(255,255,255,.14);border-radius:13px;padding:9px 12px;backdrop-filter:blur(4px)}
  .pillio .t{font-size:11px;color:rgba(255,255,255,.85);display:flex;align-items:center;gap:5px}
  .pillio .v{font-family:var(--display);font-weight:700;font-size:15px;margin-top:2px}

  /* ---------- Section ---------- */
  .sec{margin-top:24px}
  .sec-h{display:flex;align-items:baseline;justify-content:space-between;margin:0 2px 13px}
  .sec-h h3{font-family:var(--display);font-size:16px;font-weight:700}
  .sec-h .mut{font-size:12.5px;color:var(--muted);font-weight:500}

  /* ---------- Donut ---------- */
  .chart-card{background:var(--card);border-radius:22px;box-shadow:var(--shadow);padding:18px}
  .donut-wrap{position:relative;width:188px;height:188px;margin:4px auto 6px}
  .donut-wrap svg{display:block}
  .seg{cursor:pointer;transition:stroke-width .2s ease,opacity .2s ease}
  .seg:hover{opacity:.85}
  .center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;text-align:center;padding:0 30px}
  .center .ce{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.02em}
  .center .cv{font-family:var(--display);font-weight:800;font-size:23px;letter-spacing:-.02em;margin-top:1px}
  .center .cp{font-size:11.5px;color:var(--muted);margin-top:1px}

  /* ---------- Categoria list ---------- */
  .cats{margin-top:6px;display:flex;flex-direction:column;gap:3px}
  .catrow{display:flex;align-items:center;gap:12px;padding:10px 8px;border-radius:14px;cursor:pointer;transition:background .15s;border:1.5px solid transparent}
  .catrow:hover{background:var(--screen)}
  .catrow.on{background:var(--screen);border-color:var(--line-2)}
  .catico{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;flex:none}
  .catrow .cb{flex:1;min-width:0}
  .catrow .cn{font-size:14px;font-weight:600;display:flex;justify-content:space-between;gap:8px}
  .catrow .cn b{font-weight:700;font-variant-numeric:tabular-nums}
  .catrow .track{height:6px;background:var(--line);border-radius:20px;margin-top:7px;overflow:hidden}
  .catrow .track i{display:block;height:100%;border-radius:20px;transition:width .5s cubic-bezier(.4,0,.2,1)}

  /* ---------- Detalhe ---------- */
  .detail{background:var(--card);border-radius:22px;box-shadow:var(--shadow);padding:18px;margin-top:14px}
  .detail-h{display:flex;align-items:center;gap:11px;padding-bottom:13px;border-bottom:1px solid var(--line);margin-bottom:5px}
  .detail-h .catico{width:42px;height:42px}
  .detail-h .dt{flex:1}
  .detail-h .dt b{font-family:var(--display);font-size:15px;font-weight:700;display:block}
  .detail-h .dt small{font-size:12px;color:var(--muted)}
  .detail-h .dv{font-family:var(--display);font-weight:800;font-size:17px}
  .tx{display:flex;align-items:center;gap:12px;padding:11px 2px;border-top:1px solid var(--line)}
  .tx:first-of-type{border-top:none}
  .tx .tdot{width:34px;height:34px;border-radius:10px;background:var(--screen);display:flex;align-items:center;justify-content:center;font-size:15px;flex:none}
  .tx .tb{flex:1;min-width:0}
  .tx .tb b{font-size:13.5px;font-weight:600;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tx .tb small{font-size:11.5px;color:var(--muted)}
  .tx .tv{font-weight:700;font-size:14px;font-variant-numeric:tabular-nums}
  .tx .tv.out{color:var(--out)}
  .tx .tv.in{color:var(--in)}

  /* ---------- Metas ---------- */
  .alert{display:flex;gap:10px;align-items:flex-start;background:var(--out-soft);border:1px solid #F6CDC4;color:#A6341F;border-radius:15px;padding:12px 14px;margin-bottom:14px;font-size:12.5px;font-weight:500}
  .alert b{font-weight:700}
  .goal{background:var(--card);border-radius:18px;box-shadow:var(--shadow);padding:15px 16px;margin-bottom:11px}
  .goal.total{background:linear-gradient(150deg,#1b2030,#171B2C);color:#fff}
  .goal .gh{display:flex;justify-content:space-between;align-items:baseline;font-size:13.5px;font-weight:600}
  .goal .gh .g-r{font-size:12.5px;color:var(--muted);font-weight:600;font-variant-numeric:tabular-nums}
  .goal.total .gh .g-r{color:rgba(255,255,255,.75)}
  .goal .track{height:8px;background:var(--line);border-radius:20px;margin-top:10px;overflow:hidden}
  .goal.total .track{background:rgba(255,255,255,.18)}
  .goal .track i{display:block;height:100%;border-radius:20px;background:var(--green);transition:width .5s cubic-bezier(.4,0,.2,1)}
  .goal .track i.over{background:var(--out)}
  .goal .gnote{font-size:11.5px;margin-top:8px;color:var(--muted)}
  .goal .gnote.over{color:var(--out);font-weight:600}
  .goal.total .gnote{color:rgba(255,255,255,.7)}
  .goal.total .gnote.over{color:#FFB3A5}
  .metas-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  .mini-goal{background:var(--card);border-radius:16px;box-shadow:var(--shadow);padding:13px}
  .mini-goal .mg-h{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:600}
  .mini-goal .mg-h .d{width:9px;height:9px;border-radius:50%;flex:none}
  .mini-goal .mv{font-size:11.5px;color:var(--muted);margin-top:6px;font-variant-numeric:tabular-nums}
  .mini-goal .mv b{color:var(--ink)}
  .mini-goal .track{height:6px;background:var(--line);border-radius:20px;margin-top:7px;overflow:hidden}
  .mini-goal .track i{display:block;height:100%;border-radius:20px}

  /* ---------- FAB ---------- */
  .fab{position:absolute;right:20px;bottom:24px;width:60px;height:60px;border-radius:20px;border:none;background:linear-gradient(150deg,#13a06f,#0a6f4d);color:#fff;font-size:30px;line-height:1;cursor:pointer;box-shadow:0 12px 26px rgba(12,125,86,.45);z-index:30;display:flex;align-items:center;justify-content:center;transition:transform .15s}
  .fab:active{transform:scale(.93)}

  /* ---------- Sheet ---------- */
  .backdrop{position:absolute;inset:0;background:rgba(15,19,32,.45);opacity:0;pointer-events:none;transition:opacity .25s;z-index:45}
  .backdrop.show{opacity:1;pointer-events:auto}
  .sheet{position:absolute;left:0;right:0;bottom:0;background:var(--card);border-radius:26px 26px 0 0;padding:10px 20px 26px;transform:translateY(110%);transition:transform .3s cubic-bezier(.3,0,.2,1);z-index:46}
  .sheet.show{transform:translateY(0)}
  .grip{width:42px;height:5px;background:var(--line-2);border-radius:10px;margin:6px auto 14px}
  .sheet h4{font-family:var(--display);font-size:18px;font-weight:700;margin-bottom:16px}
  .seg-toggle{display:flex;gap:8px;margin-bottom:14px}
  .seg-toggle button{flex:1;border:1.5px solid var(--line-2);background:#fff;border-radius:13px;padding:11px;font:inherit;font-size:14px;font-weight:600;color:var(--muted);cursor:pointer;transition:.15s}
  .seg-toggle button.on[data-tipo=saida]{background:var(--out-soft);border-color:var(--out);color:var(--out)}
  .seg-toggle button.on[data-tipo=entrada]{background:var(--in-soft);border-color:var(--in);color:var(--in-d,#0c7d56)}
  .fld{margin-bottom:13px}
  .fld label{display:block;font-size:12.5px;color:var(--muted);font-weight:600;margin-bottom:6px}
  .fld input,.fld select{width:100%;border:1.5px solid var(--line-2);background:var(--screen);border-radius:13px;padding:13px 14px;font:inherit;font-size:15px;font-weight:600;color:var(--ink)}
  .fld input:focus,.fld select:focus{outline:2px solid var(--green);outline-offset:1px;border-color:var(--green)}
  .save{width:100%;border:none;background:linear-gradient(150deg,#13a06f,#0a6f4d);color:#fff;font:inherit;font-weight:700;font-size:15px;padding:15px;border-radius:15px;cursor:pointer;margin-top:6px;transition:filter .15s}
  .save:active{filter:brightness(1.08)}

  .ftr{text-align:center;font-size:11px;color:var(--muted);padding:16px 0 4px}

  @media (max-width:430px){
    .stage{padding:0}
    .device{max-width:100%;height:100vh;border-radius:0;box-shadow:none}
    .notch{display:none}
    .statusbar{padding-top:14px}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="stage">
  <div class="device">
    <div class="notch"></div>
    <div class="screen">
      <div class="statusbar">
        <span>9:41</span>
        <span class="ic">●●● &nbsp;📶 &nbsp;🔋</span>
      </div>

      <div class="app">
        <div class="head">
          <div>
            <div class="hi">Olá, bom dia 👋</div>
            <div class="nm"><span class="d"></span>Bolso</div>
          </div>
          <div class="av">E</div>
        </div>

        <!-- Saldo -->
        <div class="balance">
          <div class="lab">Saldo total</div>
          <div class="amt" id="saldo">R$ 0</div>
          <div class="io">
            <div class="pillio">
              <div class="t">↑ Entradas</div>
              <div class="v" id="entradas">R$ 0</div>
            </div>
            <div class="pillio">
              <div class="t">↓ Saídas</div>
              <div class="v" id="saidas">R$ 0</div>
            </div>
          </div>
        </div>

        <!-- Gastos por categoria -->
        <div class="sec">
          <div class="sec-h">
            <h3>Gastos por categoria</h3>
            <span class="mut" id="mesLabel">este mês</span>
          </div>
          <div class="chart-card">
            <div class="donut-wrap">
              <svg width="188" height="188" viewBox="0 0 188 188" id="donut"></svg>
              <div class="center" id="donutCenter"></div>
            </div>
            <div class="cats" id="cats"></div>
          </div>
        </div>

        <!-- Detalhe da categoria -->
        <div id="detail"></div>

        <!-- Metas -->
        <div class="sec">
          <div class="sec-h">
            <h3>Metas do mês</h3>
            <span class="mut">aviso ao estourar</span>
          </div>
          <div id="metas"></div>
        </div>

        <div class="ftr">Protótipo demonstrativo · dados salvos neste navegador</div>
      </div>
    </div>

    <button class="fab" id="fab" aria-label="Nova transação">+</button>

    <!-- Sheet -->
    <div class="backdrop" id="backdrop"></div>
    <div class="sheet" id="sheet">
      <div class="grip"></div>
      <h4>Nova transação</h4>
      <div class="seg-toggle" id="tipoToggle">
        <button data-tipo="saida" class="on">Saída</button>
        <button data-tipo="entrada">Entrada</button>
      </div>
      <div class="fld">
        <label>Descrição</label>
        <input type="text" id="f_desc" placeholder="Ex.: Mercado, Uber, Salário…" maxlength="40">
      </div>
      <div class="fld">
        <label>Valor</label>
        <input type="number" id="f_valor" placeholder="0,00" min="0" step="0.01" inputmode="decimal">
      </div>
      <div class="fld" id="f_cat_fld">
        <label>Categoria</label>
        <select id="f_cat"></select>
      </div>
      <button class="save" id="saveBtn">Adicionar</button>
    </div>
  </div>
</div>

<script>
// ---------------- Dados ----------------
const CATS = [
  {id:'alim',   nome:'Alimentação', cor:'#F2994A', icon:'🍽️', meta:800},
  {id:'transp', nome:'Transporte',  cor:'#2D9CDB', icon:'🚗', meta:400},
  {id:'mor',    nome:'Moradia',     cor:'#9B51E0', icon:'🏠', meta:1500},
  {id:'saude',  nome:'Saúde',       cor:'#EB5757', icon:'💊', meta:300},
  {id:'lazer',  nome:'Lazer',       cor:'#F2C94C', icon:'🎬', meta:400},
  {id:'merc',   nome:'Mercado',     cor:'#27AE60', icon:'🛒', meta:700},
  {id:'outros', nome:'Outros',      cor:'#8A93A6', icon:'📦', meta:0}
];
const CAT = Object.fromEntries(CATS.map(c=>[c.id,c]));

function ym(){ const d=new Date(); return d.toISOString().slice(0,7); }
function uid(){ return Math.random().toString(36).slice(2,9); }

function seed(){
  const M = ym();
  const d = n => M + '-' + String(n).padStart(2,'0');
  const S = (desc,valor,cat,dia)=>({id:uid(),desc,valor,tipo:'saida',cat,data:d(dia)});
  return {
    metaTotal: 3500,
    selected: null,
    tx: [
      {id:uid(),desc:'Salário',valor:5000,tipo:'entrada',cat:null,data:d(5)},
      {id:uid(),desc:'Freelance',valor:600,tipo:'entrada',cat:null,data:d(20)},
      // Alimentação
      S('iFood',58,'alim',3), S('Restaurante',92,'alim',6), S('Padaria',28,'alim',8),
      S('Hambúrguer',47,'alim',12), S('iFood',63,'alim',15), S('Restaurante',115,'alim',18),
      S('Café',22,'alim',20), S('iFood',54,'alim',22), S('Pizza',98,'alim',24),
      S('Almoço',39,'alim',26), S('Sushi',135,'alim',28), S('Padaria',31,'alim',29), S('Lanche',45,'alim',30),
      // Transporte
      S('Uber',24,'transp',4), S('Gasolina',200,'transp',10), S('Uber',31,'transp',14),
      S('Bilhete ônibus',18,'transp',16), S('Uber',28,'transp',21), S('Estacionamento',11,'transp',27),
      // Moradia
      S('Aluguel',1300,'mor',5), S('Internet',99,'mor',9), S('Conta de luz',90,'mor',11),
      // Saúde
      S('Farmácia',78,'saude',13), S('Consulta',150,'saude',19),
      // Lazer
      S('Spotify',22,'lazer',2), S('Cinema',64,'lazer',7), S('Show',120,'lazer',17), S('Bar',95,'lazer',23),
      // Mercado
      S('Supermercado',320,'merc',1), S('Supermercado',285,'merc',15),
      // Outros
      S('Presente',90,'outros',20), S('Saque',50,'outros',25)
    ]
  };
}

let state = null;

// ---------------- Helpers ----------------
const BRL = new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'});
const money = v => BRL.format(v);
const money0 = v => 'R$ ' + Math.round(v).toLocaleString('pt-BR');
const $ = id => document.getElementById(id);
const esc = s => String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const ddmm = iso => { const p=iso.split('-'); return p[2]+'/'+p[1]; };

const store = {
  get(k){ try{ const r=localStorage.getItem(k); return r?JSON.parse(r):null; }catch(e){ return null; } },
  set(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} }
};

function totals(){
  let inc=0, out=0; const per={};
  CATS.forEach(c=>per[c.id]=0);
  state.tx.forEach(t=>{
    if(t.tipo==='entrada') inc+=t.valor;
    else { out+=t.valor; per[t.cat]=(per[t.cat]||0)+t.valor; }
  });
  return {inc, out, saldo:inc-out, per};
}

// ---------------- Render ----------------
function render(){
  const t = totals();

  $('saldo').textContent = money(t.saldo);
  $('entradas').textContent = money(t.inc);
  $('saidas').textContent = money(t.out);

  const mes = new Date().toLocaleDateString('pt-BR',{month:'long'});
  $('mesLabel').textContent = mes.charAt(0).toUpperCase()+mes.slice(1);

  // default selected = maior gasto
  const ordered = CATS.filter(c=>t.per[c.id]>0).sort((a,b)=>t.per[b.id]-t.per[a.id]);
  if(!state.selected || t.per[state.selected]===undefined || t.per[state.selected]===0){
    state.selected = ordered.length ? ordered[0].id : null;
  }

  renderDonut(t);
  renderCats(t, ordered);
  renderDetail(t);
  renderMetas(t);
}

function renderDonut(t){
  const r=70, C=2*Math.PI*r, cx=94, cy=94;
  const segs = CATS.filter(c=>t.per[c.id]>0);
  let off=0, html='';
  if(t.out===0){
    html = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#ECEEF4" stroke-width="18"/>`;
  } else {
    segs.forEach(c=>{
      const frac = t.per[c.id]/t.out;
      const len = frac*C;
      const sel = state.selected===c.id;
      const gap = 1.2;
      html += `<circle class="seg" data-cat="${c.id}" cx="${cx}" cy="${cy}" r="${r}" fill="none"
        stroke="${c.cor}" stroke-width="${sel?24:17}" stroke-linecap="butt"
        stroke-dasharray="${Math.max(len-gap,0)} ${C-Math.max(len-gap,0)}" stroke-dashoffset="${-off}"
        opacity="${state.selected && !sel ? .55 : 1}"/>`;
      off += len;
    });
  }
  $('donut').innerHTML = `<g transform="rotate(-90 ${cx} ${cy})">${html}</g>`;

  const center = $('donutCenter');
  if(state.selected && CAT[state.selected]){
    const c = CAT[state.selected];
    const val = t.per[c.id];
    const pct = t.out ? Math.round(val/t.out*100) : 0;
    center.innerHTML = `<div class="ce">${esc(c.nome)}</div><div class="cv">${money0(val)}</div><div class="cp">${pct}% dos gastos</div>`;
  } else {
    center.innerHTML = `<div class="ce">Gasto do mês</div><div class="cv">${money0(t.out)}</div>`;
  }
}

function renderCats(t, ordered){
  $('cats').innerHTML = ordered.map(c=>{
    const val=t.per[c.id]; const pct=t.out?Math.round(val/t.out*100):0;
    return `<div class="catrow ${state.selected===c.id?'on':''}" data-cat="${c.id}">
      <div class="catico" style="background:${c.cor}22;color:${c.cor}">${c.icon}</div>
      <div class="cb">
        <div class="cn"><span>${esc(c.nome)}</span><b>${money0(val)}</b></div>
        <div class="track"><i style="width:${pct}%;background:${c.cor}"></i></div>
      </div>
    </div>`;
  }).join('');
}

function renderDetail(t){
  const box=$('detail');
  if(!state.selected || !CAT[state.selected]){ box.innerHTML=''; return; }
  const c=CAT[state.selected];
  const list=state.tx.filter(x=>x.tipo==='saida'&&x.cat===c.id).sort((a,b)=>b.data.localeCompare(a.data));
  box.innerHTML = `<div class="detail">
    <div class="detail-h">
      <div class="catico" style="background:${c.cor}22;color:${c.cor}">${c.icon}</div>
      <div class="dt"><b>${esc(c.nome)}</b><small>${list.length} transação(ões) este mês</small></div>
      <div class="dv">${money(t.per[c.id])}</div>
    </div>
    ${list.map(x=>`<div class="tx">
      <div class="tdot">${c.icon}</div>
      <div class="tb"><b>${esc(x.desc)}</b><small>${ddmm(x.data)}</small></div>
      <div class="tv out">- ${money(x.valor)}</div>
    </div>`).join('')}
  </div>`;
}

function renderMetas(t){
  const overCats = CATS.filter(c=>c.meta>0 && t.per[c.id]>c.meta);
  const overTotal = t.out>state.metaTotal;
  let alert='';
  if(overTotal || overCats.length){
    const names=[];
    if(overTotal) names.push('no total');
    overCats.forEach(c=>names.push(c.nome));
    alert = `<div class="alert"><span>🔔</span><span>Você passou da meta <b>${names.join(', ')}</b>. Hora de segurar os gastos!</span></div>`;
  }

  const pctTotal = state.metaTotal? Math.min(Math.round(t.out/state.metaTotal*100),100):0;
  const totalGoal = `<div class="goal total">
    <div class="gh"><span>Meta total do mês</span><span class="g-r">${money0(t.out)} / ${money0(state.metaTotal)}</span></div>
    <div class="track"><i class="${overTotal?'over':''}" style="width:${pctTotal}%"></i></div>
    <div class="gnote ${overTotal?'over':''}">${overTotal? 'Estourou em '+money0(t.out-state.metaTotal) : 'Restam '+money0(state.metaTotal-t.out)}</div>
  </div>`;

  const mini = CATS.filter(c=>c.meta>0).map(c=>{
    const val=t.per[c.id]; const over=val>c.meta; const pct=Math.min(Math.round(val/c.meta*100),100);
    return `<div class="mini-goal">
      <div class="mg-h"><span class="d" style="background:${c.cor}"></span>${esc(c.nome)}</div>
      <div class="mv"><b>${money0(val)}</b> / ${money0(c.meta)}</div>
      <div class="track"><i style="width:${pct}%;background:${over?'#E5573D':c.cor}"></i></div>
    </div>`;
  }).join('');

  $('metas').innerHTML = alert + totalGoal + `<div class="metas-grid">${mini}</div>`;
}

// ---------------- Interação ----------------
function selectCat(id){ state.selected=id; persist(); render(); }

$('cats').addEventListener('click', e=>{ const r=e.target.closest('[data-cat]'); if(r) selectCat(r.dataset.cat); });
$('donut').addEventListener('click', e=>{ const s=e.target.closest('[data-cat]'); if(s) selectCat(s.dataset.cat); });

// Sheet
let formTipo='saida';
function openSheet(){ $('backdrop').classList.add('show'); $('sheet').classList.add('show'); $('f_desc').focus(); }
function closeSheet(){ $('backdrop').classList.remove('show'); $('sheet').classList.remove('show'); }
$('fab').addEventListener('click', openSheet);
$('backdrop').addEventListener('click', closeSheet);

$('tipoToggle').addEventListener('click', e=>{
  const b=e.target.closest('[data-tipo]'); if(!b) return;
  formTipo=b.dataset.tipo;
  [...$('tipoToggle').children].forEach(x=>x.classList.toggle('on', x===b));
  $('f_cat_fld').style.display = formTipo==='saida' ? 'block' : 'none';
});

$('saveBtn').addEventListener('click', ()=>{
  const desc=$('f_desc').value.trim();
  const valor=parseFloat($('f_valor').value);
  if(!desc || !isFinite(valor) || valor<=0){ $('f_desc').focus(); return; }
  const tx={id:uid(),desc,valor:Math.round(valor*100)/100,tipo:formTipo,
            cat: formTipo==='saida' ? $('f_cat').value : null, data: ym()+'-'+String(new Date().getDate()).padStart(2,'0')};
  state.tx.unshift(tx);
  if(formTipo==='saida') state.selected=tx.cat;
  $('f_desc').value=''; $('f_valor').value='';
  persist(); render(); closeSheet();
});

// ---------------- Boot ----------------
function persist(){ store.set('bolso-state', state); }
function fillCatSelect(){ $('f_cat').innerHTML = CATS.map(c=>`<option value="${c.id}">${c.icon} ${esc(c.nome)}</option>`).join(''); }

function load(){
  const saved = store.get('bolso-state');
  state = (saved && saved.tx) ? saved : seed();
  if(state.metaTotal===undefined) state.metaTotal=3500;
  fillCatSelect();
  persist();
  render();
}
load();
</script>
</body>
</html>
